name: CI - Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run build -- --noEmit   # TypeScript check only

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build Backend
        run: npm run build

  frontend:
    name: Frontend (Expo React Native)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Run lint (if you have lint script)
        run: npm run lint || echo "No lint script found - skipping"

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Build Expo (Check for errors)
        run: npx expo export --platform all || echo "Expo export check completed"