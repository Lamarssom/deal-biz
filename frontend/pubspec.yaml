name: deal_biz_frontend
description: Hyperlocal Promotion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  riverpod_annotation: ^2.3.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  dio: ^5.7.0
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Responsive
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1

  # Location & Maps
  geolocator: ^13.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # QR Code
  mobile_scanner: ^5.2.0
  qr_flutter: ^4.1.0

  # Notifications (optional but recommended)
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Utils
  cached_network_image: ^3.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.1
  very_good_analysis: ^6.0.0   # or flutter_lints

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/